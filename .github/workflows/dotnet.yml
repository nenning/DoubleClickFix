name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build DoubleClickFix/DoubleClickFix.csproj --no-restore --configuration Release --property:SkipWapProjects=true
      shell: pwsh

    - name: Run tests
      run: dotnet test DoubleClickFix.Tests/DoubleClickFix.Tests.csproj --no-restore --configuration Release
      shell: pwsh

    - name: Package binaries
      run: |
        mkdir Release
        Copy-Item -Path DoubleClickFix/bin/Release/net10.0-windows10.0.17763.0/* -Destination Release/ -Recurse        
      shell: pwsh

    - name: Create ZIP file
      run: Compress-Archive -Path Release/* -DestinationPath DoubleClickFix.zip
      shell: pwsh

    - name: Create Release and upload assets
      uses: softprops/action-gh-release@v2
      with:
        body: |
          Release notes
          Download the binaries, extract the DoubleClickFix.zip file and launch DoubleClickFix.exe.
          This will launch a Windows tray icon. Double-click it to open the UI and fine-tune the settings.
          Windows only. Requires .NET 9 run-time.
        draft: false
        prerelease: false
        files: ./DoubleClickFix.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
